services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: codencil
      POSTGRES_PASSWORD: codencil
      POSTGRES_DB: codencil
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codencil -d codencil"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.18.2
    volumes:
      - ./db/migrations:/migrations:ro
    environment:
      DATABASE_URL: postgres://codencil:codencil@postgres:5432/codencil?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["migrate"]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    volumes:
      - ./apps/api:/app
    working_dir: /app
    environment:
      DATABASE_URL: postgres://codencil:codencil@postgres:5432/codencil?sslmode=disable
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["go", "run", "./cmd/codencil"]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    volumes:
      - ./apps/web:/app
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    command: ["sh", "-c", "npm install && npm run dev -- --hostname 0.0.0.0 -p 3000"]

volumes:
  postgres_data:
