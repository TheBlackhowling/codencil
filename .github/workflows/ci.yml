name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify agent documentation
        run: |
          test -f agents/AGENTS.md
          test -f agents/BUILD_ORDER.md
          test -f agents/progress.md
          test -f CONTRIBUTING.md

      - name: Validate Docker Compose config
        if: hashFiles('docker-compose.yml') != ''
        run: docker compose config

      - name: Build images
        if: hashFiles('docker-compose.yml') != ''
        run: docker compose build

      - name: Run API tests
        if: hashFiles('docker-compose.yml') != '' && hashFiles('apps/api/go.mod') != ''
        run: |
          docker compose run --rm --no-deps api sh -c '
            if go list ./... 2>/dev/null | grep -q .; then
              go test ./...
            else
              echo "No Go packages yet — skipping go test (expected before P0.4)"
            fi
          '

      - name: Run API vet
        if: hashFiles('docker-compose.yml') != '' && hashFiles('apps/api/go.mod') != ''
        run: |
          docker compose run --rm --no-deps api sh -c '
            if go list ./... 2>/dev/null | grep -q .; then
              go vet ./...
            else
              echo "No Go packages yet — skipping go vet (expected before P0.4)"
            fi
          '

      - name: Run migrations
        if: hashFiles('docker-compose.yml') != '' && hashFiles('db/migrations/*.up.sql') != ''
        run: |
          docker compose up -d postgres
          docker compose run --rm migrate -path /migrations -database "postgres://codencil:codencil@postgres:5432/codencil?sslmode=disable" up
          docker compose run --rm migrate -path /migrations -database "postgres://codencil:codencil@postgres:5432/codencil?sslmode=disable" down 1
          docker compose run --rm migrate -path /migrations -database "postgres://codencil:codencil@postgres:5432/codencil?sslmode=disable" up

      - name: Build web
        if: hashFiles('docker-compose.yml') != '' && hashFiles('apps/web/package.json') != ''
        run: docker compose run --rm web npm run build
